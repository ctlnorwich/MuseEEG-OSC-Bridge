name: Build Standalone Apps

on:
  release:
    types: [published]
  workflow_dispatch:

jobs:
  build:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, windows-latest, ubuntu-latest]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt pyinstaller

      - name: Build with PyInstaller
        run: pyinstaller Muse-OSC-Bridge.spec --noconfirm

      - name: Ad-hoc codesign with Bluetooth entitlements (macOS only)
        if: runner.os == 'macOS'
        run: |
          codesign --force --deep --sign - \
            --entitlements entitlements.plist \
            dist/Muse-OSC-Bridge.app

      - name: Zip .app for upload (macOS only)
        if: runner.os == 'macOS'
        run: |
          cd dist
          zip -r --symlinks Muse-OSC-Bridge-macos.zip Muse-OSC-Bridge.app

      - name: Upload signed .app artifact (macOS only)
        if: runner.os == 'macOS' && github.event_name != 'release'
        uses: actions/upload-artifact@v4
        with:
          name: Muse-OSC-Bridge-macos-app
          path: dist/Muse-OSC-Bridge-macos.zip

      - name: Upload macOS release asset
        if: runner.os == 'macOS' && github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.release.tag_name }}
          files: dist/Muse-OSC-Bridge-macos.zip
          overwrite_files: true

      - name: Package Windows build artifacts
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $items = @()
          if (Test-Path 'dist/Muse-OSC-Bridge.exe') { $items += 'dist/Muse-OSC-Bridge.exe' }
          if (Test-Path 'dist/Muse-OSC-Bridge') { $items += 'dist/Muse-OSC-Bridge' }
          if ($items.Count -eq 0) { throw 'No Windows build outputs found in dist/' }
          Compress-Archive -Path $items -DestinationPath 'dist/Muse-OSC-Bridge-windows.zip' -Force

      - name: Upload Windows artifact
        if: runner.os == 'Windows' && github.event_name != 'release'
        uses: actions/upload-artifact@v4
        with:
          name: Muse-OSC-Bridge-windows
          path: dist/Muse-OSC-Bridge-windows.zip

      - name: Upload Windows release asset
        if: runner.os == 'Windows' && github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.release.tag_name }}
          files: dist/Muse-OSC-Bridge-windows.zip
          overwrite_files: true

      - name: Package Linux build artifacts
        if: runner.os == 'Linux'
        run: |
          cd dist
          tar -czf Muse-OSC-Bridge-linux.tar.gz Muse-OSC-Bridge

      - name: Upload Linux artifact
        if: runner.os == 'Linux' && github.event_name != 'release'
        uses: actions/upload-artifact@v4
        with:
          name: Muse-OSC-Bridge-linux
          path: dist/Muse-OSC-Bridge-linux.tar.gz

      - name: Upload Linux release asset
        if: runner.os == 'Linux' && github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.release.tag_name }}
          files: dist/Muse-OSC-Bridge-linux.tar.gz
          overwrite_files: true
