name: Build Standalone Apps

on:
  release:
    types: [published]
  workflow_dispatch:

jobs:
  build:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, windows-latest, ubuntu-latest]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt pyinstaller

      - name: Build with PyInstaller
        run: pyinstaller Muse-OSC-Bridge.spec --noconfirm

      - name: Ad-hoc codesign with Bluetooth entitlements (macOS only)
        if: runner.os == 'macOS'
        run: |
          codesign --force --deep --sign - \
            --entitlements entitlements.plist \
            dist/Muse-OSC-Bridge.app

      - name: Zip .app for upload (macOS only)
        if: runner.os == 'macOS'
        run: |
          cd dist
          zip -r --symlinks Muse-OSC-Bridge-macos.zip Muse-OSC-Bridge.app

      - name: Upload signed .app artifact (macOS only)
        if: runner.os == 'macOS'
        uses: actions/upload-artifact@v4
        with:
          name: Muse-OSC-Bridge-macos-app
          path: dist/Muse-OSC-Bridge-macos.zip

      - name: Upload build artifacts (non-macOS)
        if: runner.os != 'macOS'
        uses: actions/upload-artifact@v4
        with:
          name: Muse-OSC-Bridge-${{ matrix.os }}
          path: |
            dist/Muse-OSC-Bridge/**
            dist/Muse-OSC-Bridge.exe
