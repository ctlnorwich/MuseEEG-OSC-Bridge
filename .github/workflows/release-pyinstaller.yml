name: Build Standalone Apps

on:
  release:
    types: [published]
  workflow_dispatch:

jobs:
  build:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, windows-latest, ubuntu-latest]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt pyinstaller

      - name: Build with PyInstaller
        run: pyinstaller Muse-OSC-Bridge.spec --noconfirm

      - name: Ad-hoc codesign with Bluetooth entitlements (macOS only)
        if: runner.os == 'macOS'
        run: |
          codesign --force --deep --sign - \
            --entitlements entitlements.plist \
            dist/Muse-OSC-Bridge.app

      - name: Zip .app for upload (macOS only)
        if: runner.os == 'macOS'
        run: |
          cd dist
          zip -r --symlinks Muse-OSC-Bridge-macos.zip Muse-OSC-Bridge.app

      - name: Upload signed .app artifact (macOS only)
        if: runner.os == 'macOS'
        uses: actions/upload-artifact@v4
        with:
          name: Muse-OSC-Bridge-macos-app
          path: dist/Muse-OSC-Bridge-macos.zip

      - name: Package Windows build artifacts
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $items = @()
          if (Test-Path 'dist/Muse-OSC-Bridge.exe') { $items += 'dist/Muse-OSC-Bridge.exe' }
          if (Test-Path 'dist/Muse-OSC-Bridge') { $items += 'dist/Muse-OSC-Bridge' }
          if ($items.Count -eq 0) { throw 'No Windows build outputs found in dist/' }
          Compress-Archive -Path $items -DestinationPath 'dist/Muse-OSC-Bridge-windows.zip' -Force

      - name: Upload Windows artifact
        if: runner.os == 'Windows'
        uses: actions/upload-artifact@v4
        with:
          name: Muse-OSC-Bridge-windows
          path: dist/Muse-OSC-Bridge-windows.zip

      - name: Package Linux build artifacts
        if: runner.os == 'Linux'
        run: |
          cd dist
          zip -r Muse-OSC-Bridge-linux.zip Muse-OSC-Bridge

      - name: Upload Linux artifact
        if: runner.os == 'Linux'
        uses: actions/upload-artifact@v4
        with:
          name: Muse-OSC-Bridge-linux
          path: dist/Muse-OSC-Bridge-linux.zip

  upload-release-assets:
    name: Upload artifacts to release
    needs: build
    if: github.event_name == 'release'
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets

      - name: Upload macOS + Windows + Linux assets to release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release upload "${{ github.event.release.tag_name }}" \
            release-assets/Muse-OSC-Bridge-macos-app/Muse-OSC-Bridge-macos.zip \
            release-assets/Muse-OSC-Bridge-windows/Muse-OSC-Bridge-windows.zip \
            release-assets/Muse-OSC-Bridge-linux/Muse-OSC-Bridge-linux.zip \
            --clobber
